<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Curso</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Curso</h1>
        <form id="createCourseForm">
            <label>Nombre del curso</label>
            <input type="text" id="nombre" placeholder="Ej: Programación 1" required>
            <label>Código</label>
            <input type="text" id="codigo" placeholder="Ej: PROG-101" required>
            <label>Descripción</label>
            <input type="text" id="descripcion" placeholder="Descripción del curso">
            <label>Profesor</label>
            <select id="profesorSelect" required>
                <option value="">-- Seleccione un profesor --</option>
            </select>
            <button type="submit">➕ Guardar Curso</button>
        </form>
        <a href="list_course.html"><button>🔙 Volver a la lista</button></a>
        <button onclick="logout()">🚪 Cerrar Sesión</button>

    </div>
    <script src="../js/course.js"></script>
    <script>
        checkAuth();
        cargarProfesores();

        document.getElementById("createCourseForm")
            .addEventListener("submit", function(e) {
                e.preventDefault();
                guardarCurso();
            });
    </script>
</body>
</html>
